<head>
	<meta charset="utf-8">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<base target="_blank">

	<title class="pageTitle">{{ site.page_title }}</title>
	<meta name="description" content="{{ site.app_description }}">

	<link rel="shortcut icon" href="{{ site.app_icon }}">

	<!-- SEO & Open Graph Meta Tags -->
	<meta property="og:title" content="{{ site.page_title }}">
	<meta property="og:description" content="{{ site.app_description }}">
	<meta property="og:type" content="website">
	<meta property="og:image" content="{{ site.app_icon }}">

	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="{{ site.page_title }}">
	<meta name="twitter:description" content="{{ site.app_description }}">
	<meta name="twitter:image" content="{{ site.app_icon }}">
	{% if site.twitter_username %}
	<meta name="twitter:site" content="@{{ site.twitter_username }}">
	{% endif %}

	<!-- Structured Data for Search Engines -->
	<script type="application/ld+json">
	{
	  "@context": "https://schema.org",
	  "@type": "SoftwareApplication",
	  "name": "{{ site.app_name }}",
	  "operatingSystem": "ANDROID, iOS",
	  "applicationCategory": "DesignApplication",
	  "description": "{{ site.app_description }}",
	  "offers": {
	    "@type": "Offer",
	    "price": "0",
	    "priceCurrency": "USD"
	  }
	}
	</script>

	<!-- Smart App Banner -->
	{% if site.enable_smart_app_banner %}
	<meta name="apple-itunes-app" content="app-id={{ site.ios_app_id }}">
	{% endif %}

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="/main.css">
	<link rel="stylesheet" href="main.css">
	<link rel="stylesheet" href="../main.css">
</head>
